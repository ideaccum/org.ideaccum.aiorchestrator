<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Multi Agent Controller</title>
		<link rel="icon" href="image/favicon.ico" type="image/x-icon" />
		<link rel="stylesheet" href="css/theme.css" />
		<link rel="stylesheet" href="css/common.css" />
		<link rel="stylesheet" href="css/layout.css" />
		<link rel="stylesheet" href="css/icons.css" />
		<link rel="stylesheet" href="agent_setting.css" />
	</head>
	<body>
		<!-- ブートオーバーレイ(初期化完了まで表示) -->
		<div id="boot-overlay" class="boot-overlay">
			<div class="loading-spinner"></div>
		</div>

		<!-- ヘッダー -->
		<div class="header">
			<img class="header-logo" src="image/logo.png" alt="" />
			<nav class="header-nav">
				<a href="/webui/project_setting.html" class="header-nav-item">プロジェクト</a>
				<a href="/webui/agent_setting.html" class="header-nav-item header-nav-requires-project header-nav-active">エージェント</a>
				<a href="/webui/process_monitor.html" class="header-nav-item header-nav-requires-project">コントローラー</a>
				<a href="/webui/log_view.html" class="header-nav-item header-nav-requires-project">ログ</a>
				<a href="/webui/config_setting.html" class="header-nav-item">設定</a>
			</nav>
			<span id="header-project-name" class="header-project-name"></span>
		</div>

		<!-- ノーティスバー -->
		<div id="page-notice" class="page-notice">
			<div id="notice-spinner" class="loading-spinner loading-spinner-sm"></div>
			<span id="notice-text"></span>
		</div>

		<!-- 切断状態パネル -->
		<div class="disconnected-panel">
			<div class="loading-spinner"></div>
			<span>サーバーとの接続が切断されました<br />再接続を待機しています</span>
		</div>

		<!-- エラー表示パネル -->
		<div id="page-message-error" class="page-message-error hidden"></div>
		<!-- 警告メッセージパネル -->
		<div id="page-message-warn" class="page-message-warn hidden"></div>
		<!-- 情報メッセージパネル -->
		<div id="page-message-info" class="page-message-info hidden"></div>

		<!-- ページヘッダー -->
		<!--
		<div class="content-header">
			<span class="content-title"></span>
		</div>
		-->

		<!-- メインコンテンツ(左右分割パネル) -->
		<div class="split-layout">
			<!-- 左パネル(エージェント一覧) -->
			<div class="split-left">
				<div class="split-left-header">
					<span class="split-left-title">エージェント一覧</span>
					<button id="btn-new" class="btn btn-icon btn-primary" title="追加"><span class="icon icon-plus"></span></button>
				</div>
				<div id="agents-list" class="split-left-body scrollbar-thin"></div>
			</div>

			<!-- 右パネル(エージェント設定) -->
			<div class="split-right">
				<!-- 右ペインヘッダー -->
				<div id="agent-form-header" class="content-header hidden">
					<div class="form-header-leading">
						<span id="session-exists-note" class="form-header-note hidden">既にセッションが存在するため変更するため、一部の項目は変更することができません</span>
					</div>
					<div class="btn-row">
						<button id="btn-save" type="button" class="btn btn-primary">保存</button>
					</div>
				</div>

				<!-- 未選択状態 -->
				<div id="agent-form-empty" class="split-empty">
					<div class="empty-msg">エージェントを選択してください。</div>
				</div>

				<!-- エージェント設定フォーム -->
				<div id="agent-form-panel" class="form-panel scrollbar-thin hidden">
					<div class="form-section-label">エージェント情報</div>
					<div class="form-row">
						<label class="form-label" for="field-name">エージェント名</label>
						<input id="field-name" class="input-field" type="text" placeholder="例: Planner" maxlength="32" />
					</div>

					<div class="form-row">
						<label class="form-label" for="field-type">タイプ</label>
						<select id="field-type" class="input-field form-select">
							<option value="claude-cli">claude-cli</option>
							<option value="gemini-cli">gemini-cli</option>
							<option value="antigravity-cli">antigravity-cli (2026.06.15：利用できません(JSON形式レスポンスオプション非対応))</option>
							<option value="codex-cli">codex-cli</option>
							<option value="copilot-cli">copilot-cli</option>
						</select>
					</div>

					<div class="form-row">
						<label class="form-label" for="field-model">モデル</label>
						<input id="field-model" class="input-field" type="text" placeholder="省略時はデフォルト（例: sonnet, opus, haiku）" maxlength="32" />
					</div>

					<div class="form-row">
						<label class="form-label" for="field-extra-args">追加引数</label>
						<input id="field-extra-args" class="input-field" type="text" placeholder="省略可（例: --flag value）" maxlength="128" />
					</div>

					<div class="form-row form-row-check">
						<label class="form-check-label">
							<input id="field-leader" type="checkbox" />
							<span>リーダーエージェント</span>
						</label>
					</div>

					<div class="form-row">
						<label class="form-label" for="field-role">役割名</label>
						<input id="field-role" class="input-field" type="text" placeholder="例: 進行計画・進行管理" maxlength="80" />
					</div>

					<div class="form-row">
						<label class="form-label" for="field-personality">性質</label>
						<textarea id="field-personality" class="input-field form-textarea" placeholder="- 必ず日本語で回答します。&#10;- ..."></textarea>
					</div>

					<div id="form-row-session-id" class="form-row">
						<label class="form-label" for="field-session-id">セッションID</label>
						<input id="field-session-id" class="input-field-readonly" type="text" readonly placeholder="(未設定)" />
					</div>
				</div>
			</div>
		</div>

		<!-- ページスクリプト -->
		<script src="lib/marked/marked-12.0.2.min.js"></script>
		<script src="js/constants.js"></script>
		<script src="js/utils.js"></script>
		<script src="js/webui.js"></script>
		<script src="js/webapi.js"></script>
		<script src="js/webctrl.js"></script>
		<script src="js/page.js"></script>
		<script src="agent_setting.js"></script>
		<script>
			Utils.init().then(() => {
				WebUI.init();
				return Promise.all([
					new PageController().init(), //
					new AgentSettingController().init(), //
				]).finally(() => {
					WebUI.hideOverlay();
				});
			});
		</script>
	</body>
</html>
