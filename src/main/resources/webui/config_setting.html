<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Multi Agent Controller</title>
		<link rel="icon" href="image/favicon.ico" type="image/x-icon" />
		<link rel="stylesheet" href="css/theme.css" />
		<link rel="stylesheet" href="css/common.css" />
		<link rel="stylesheet" href="css/layout.css" />
		<link rel="stylesheet" href="css/icons.css" />
		<link rel="stylesheet" href="config_setting.css" />
	</head>
	<body>
		<!-- ブートオーバーレイ(初期化完了まで表示) -->
		<div id="boot-overlay" class="boot-overlay">
			<div class="loading-spinner"></div>
		</div>

		<!-- ヘッダー -->
		<div class="header">
			<img class="header-logo" src="image/logo.png" alt="" />
			<nav class="header-nav">
				<a href="/webui/project_setting.html" class="header-nav-item">プロジェクト</a>
				<a href="/webui/agent_setting.html" class="header-nav-item header-nav-requires-project">エージェント</a>
				<a href="/webui/process_monitor.html" class="header-nav-item header-nav-requires-project">コントローラー</a>
				<a href="/webui/log_view.html" class="header-nav-item header-nav-requires-project">ログ</a>
				<a href="/webui/config_setting.html" class="header-nav-item header-nav-active">設定</a>
			</nav>
			<span id="header-project-name" class="header-project-name"></span>
		</div>

		<!-- ノーティスバー -->
		<div id="page-notice" class="page-notice">
			<div id="notice-spinner" class="loading-spinner loading-spinner-sm"></div>
			<span id="notice-text"></span>
		</div>

		<!-- 切断状態パネル -->
		<div class="disconnected-panel">
			<div class="loading-spinner"></div>
			<span>サーバーとの接続が切断されました<br />再接続を待機しています</span>
		</div>

		<!-- エラー表示パネル -->
		<div id="page-message-error" class="page-message-error hidden"></div>
		<!-- 警告メッセージパネル -->
		<div id="page-message-warn" class="page-message-warn hidden"></div>
		<!-- 情報メッセージパネル -->
		<div id="page-message-info" class="page-message-info hidden"></div>

		<!-- ページヘッダー -->
		<div class="content-header">
			<span class="content-title"></span>
			<div class="btn-row">
				<button id="btn-save" type="button" class="btn btn-primary">保存</button>
			</div>
		</div>

		<!-- メインコンテンツ -->
		<div class="main scrollbar-thin">
			<div class="single-layout">
				<!-- 設定フォーム -->
				<div class="form-panel">
					<!-- アプリケーション設定 -->
					<div class="form-section-label">アプリケーション設定</div>
					<div class="form-row">
						<label class="form-label" for="field-theme">テーマ</label>
						<select id="field-theme" class="input-field form-select">
							<option value="dark">ダーク</option>
							<option value="light">ライト</option>
						</select>
					</div>
					<div class="form-row">
						<label class="form-label" for="field-repository-path">リポジトリパス</label>
						<input id="field-repository-path" class="input-field" type="text" placeholder="例: ./repos" />
					</div>
					<div class="form-row">
						<label class="form-label" for="field-webui-port">WebUI ポート <span class="form-label-note">* 変更時はサーバー再起動が必要</span></label>
						<input id="field-webui-port" class="input-field" type="number" min="1" max="65535" placeholder="例: 8080" />
					</div>
					<div class="form-row">
						<label class="form-label" for="field-webui-connection">WebUI 同時接続数 <span class="form-label-note">* 変更時はサーバー再起動が必要</span></label>
						<input id="field-webui-connection" class="input-field" type="number" min="1" placeholder="例: 256" />
					</div>

					<!-- エージェント設定 -->
					<div class="form-section-label">エージェント設定</div>
					<div class="form-row">
						<label class="form-label" for="field-agent-timeout">タイムアウト（秒）</label>
						<input id="field-agent-timeout" class="input-field" type="number" min="1" placeholder="例: 300" />
					</div>

					<!-- CLI コマンド設定 -->
					<div class="form-section-label">CLI コマンド設定</div>
					<div class="form-row">
						<label class="form-label" for="field-cli-claude">Claude Code CLI</label>
						<input id="field-cli-claude" class="input-field" type="text" placeholder="例: %APPDATA%\npm\claude.cmd" />
					</div>
					<div class="form-row">
						<label class="form-label" for="field-cli-gemini">Gemini CLI</label>
						<input id="field-cli-gemini" class="input-field" type="text" placeholder="例: %APPDATA%\npm\gemini.cmd" />
					</div>
					<div class="form-row">
						<label class="form-label" for="field-cli-antigravity">Antigravity CLI</label>
						<input id="field-cli-antigravity" class="input-field" type="text" placeholder="例: %USERPROFILE%\AppData\Local\agy\bin\agy.exe" />
					</div>
					<div class="form-row">
						<label class="form-label" for="field-cli-codex">Codex CLI</label>
						<input id="field-cli-codex" class="input-field" type="text" placeholder="例: %APPDATA%\npm\codex.cmd" />
					</div>
					<div class="form-row">
						<label class="form-label" for="field-cli-copilot">GitHub Copilot CLI</label>
						<input id="field-cli-copilot" class="input-field" type="text" placeholder="例: %APPDATA%\npm\copilot.cmd" />
					</div>
				</div>
			</div>
		</div>

		<!-- ページスクリプト -->
		<script src="lib/marked/marked-12.0.2.min.js"></script>
		<script src="js/constants.js"></script>
		<script src="js/utils.js"></script>
		<script src="js/webui.js"></script>
		<script src="js/webapi.js"></script>
		<script src="js/webctrl.js"></script>
		<script src="js/page.js"></script>
		<script src="config_setting.js"></script>
		<script>
			Utils.init().then(() => {
				WebUI.init();
				return Promise.all([
					new PageController().init(), //
					new ConfigSettingController().init(), //
				]).finally(() => {
					WebUI.hideOverlay();
				});
			});
		</script>
	</body>
</html>
