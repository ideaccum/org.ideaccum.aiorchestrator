<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Multi Agent Controller</title>
		<link rel="icon" href="image/favicon.ico" type="image/x-icon" />
		<link rel="stylesheet" href="css/theme.css" />
		<link rel="stylesheet" href="css/common.css" />
		<link rel="stylesheet" href="css/layout.css" />
		<link rel="stylesheet" href="css/icons.css" />
		<link rel="stylesheet" href="process_monitor.css" />
	</head>
	<body>
		<!-- ブートオーバーレイ(初期化完了まで表示) -->
		<div id="boot-overlay" class="boot-overlay">
			<div class="loading-spinner"></div>
		</div>

		<!-- ヘッダー -->
		<div class="header">
			<img class="header-logo" src="image/logo.png" alt="" />
			<nav class="header-nav">
				<a href="/webui/project_setting.html" class="header-nav-item">プロジェクト</a>
				<a href="/webui/agent_setting.html" class="header-nav-item header-nav-requires-project">エージェント</a>
				<a href="/webui/process_monitor.html" class="header-nav-item header-nav-requires-project header-nav-active">コントローラー</a>
				<a href="/webui/log_view.html" class="header-nav-item header-nav-requires-project">ログ</a>
				<a href="/webui/config_setting.html" class="header-nav-item">設定</a>
			</nav>
			<span id="header-project-name" class="header-project-name"></span>
		</div>

		<!-- ノーティスバー -->
		<div id="page-notice" class="page-notice">
			<div id="notice-spinner" class="loading-spinner loading-spinner-sm"></div>
			<span id="notice-text"></span>
		</div>

		<!-- 切断状態パネル -->
		<div class="disconnected-panel">
			<div class="loading-spinner"></div>
			<span>サーバーとの接続が切断されました<br />再接続を待機しています</span>
		</div>

		<!-- エラー表示パネル -->
		<div id="page-message-error" class="page-message-error hidden"></div>
		<!-- 警告メッセージパネル -->
		<div id="page-message-warn" class="page-message-warn hidden"></div>
		<!-- 情報メッセージパネル -->
		<div id="page-message-info" class="page-message-info hidden"></div>

		<!-- ページヘッダー -->
		<!--
		<div class="content-header">
			<span class="content-title"></span>
		</div>
		-->

		<!-- メインコンテンツ -->
		<div class="main scrollbar-thin">
			<!-- オーナーカード -->
			<div id="owner-card" class="card owner-card hidden">
				<div class="card-header">
					<div class="card-avatar owner-avatar">O</div>
					<span class="agent-name">Owner</span>
					<div class="owner-card-actions">
						<button id="owner-start-btn" class="btn btn-run">実行</button>
						<button id="owner-stop-btn" class="btn owner-stop-btn hidden">停止</button>
					</div>
				</div>
				<!-- 発言履歴エリア -->
				<div id="owner-history" class="card-body owner-card-body scrollbar-thin" data-owner-history>
					<div class="idle-placeholder">プロンプト待ち</div>
				</div>
				<!-- プロンプト入力エリア -->
				<div class="owner-card-input">
					<div class="owner-preset-row">
						<span class="icon icon-hint owner-preset-hint"></span>
						<button id="owner-preset-check" class="btn btn-preset" type="button">エージェント存在確認</button>
						<button id="owner-preset-summary" class="btn btn-preset" type="button">過去会話のサマリー</button>
						<button id="owner-preset-next" class="btn btn-preset" type="button">推奨される次の指示</button>
						<button id="owner-preset-discussion-auto-pilot" class="btn btn-preset" type="button">自動運転トロッコ議論</button>
					</div>
					<textarea id="owner-prompt-input" class="owner-prompt-textarea scrollbar-thin" placeholder="タスクプロンプトを入力してください..."></textarea>
				</div>
			</div>
			<!-- エージェントカードグリッド -->
			<div id="agents-grid" class="hidden">
				<!-- スクリプト側で動的出力 -->
			</div>
		</div>

		<!-- ページスクリプト -->
		<script src="lib/marked/marked-12.0.2.min.js"></script>
		<script src="js/constants.js"></script>
		<script src="js/utils.js"></script>
		<script src="js/webui.js"></script>
		<script src="js/webapi.js"></script>
		<script src="js/webctrl.js"></script>
		<script src="js/page.js"></script>
		<script src="process_monitor.js"></script>
		<script>
			Utils.init().then(() => {
				WebUI.init();
				return Promise.all([
					new PageController().init(), //
					new ProcessMonitorController().init(), //
				]).finally(() => {
					WebUI.hideOverlay();
				});
			});
		</script>
	</body>
</html>
